<div class="swiper">
  <h1>Reparto</h1>
  <hr />
  <div class="swiper-wrapper">
    @for (actor of cast; track actor) {
      <div class="swiper-slide text-white text-center">
        <img [src]="actor.profile_path | poster" [alt]="actor.name" class="img-thumbnail" /> {{ actor.name }}
      </div>
    }
  </div>
</div>
