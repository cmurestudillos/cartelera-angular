<div class="row">
  @for (movie of peliculas; track movie) {
    <div class="col-md-3 mb-5 animate__animated animate__fadeIn">
      <img
        [src]="movie.poster_path | poster"
        class="img-fluid poster"
        role="button"
        tabindex="0"
        (click)="onMovieClick(movie)"
        (keyup.enter)="onMovieClick(movie)"
        [alt]="movie.title" />
      <div>
        <h3>{{ movie.title }}</h3>
        <div class="row">
          <div class="col-10 text-white">
            <app-star-rating [value]="movie.vote_average" [totalStars]="10"></app-star-rating>
          </div>
          <div class="col-2 text-white">
            {{ movie.vote_average | number: '1.1-2' }}
          </div>
        </div>
      </div>
    </div>
  }
</div>
